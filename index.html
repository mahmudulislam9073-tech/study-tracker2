:root{
  --g1:#2d7a5a;--g2:#1a4d35;--g3:#0f3320;
  --bg:#f0f4f8;--sur:#fff;--bor:#e6eaef;
  --txt:#0d1117;--mut:#64748b;--dim:#b8c4d0;
  --red:#ef4444;
  --sh:0 4px 16px -4px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.06);
  --shh:0 8px 28px -6px rgba(45,122,90,.25),0 2px 6px rgba(0,0,0,.07);
  --r:14px;--rlg:20px;
  --en:"TK",sans-serif;--bn:"SJ","Kalpurush",serif;
  --nb:64px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--txt);font-family:var(--en);
  min-height:100vh;
  background-image:radial-gradient(circle,#cdd5e0 1px,transparent 1px);
  background-size:28px 28px;background-attachment:fixed;
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#2d7a5a50;border-radius:4px;}

/* ── LAYOUT ── */
.page{display:none;}
.page.active{display:block;}
.pw{max-width:740px;margin:0 auto;padding:0 18px 28px;}

/* ── TITLE BAR ── */
.tbar{
  position:sticky;top:0;z-index:80;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.6);
  box-shadow:0 2px 20px rgba(45,122,90,.08), inset 0 1px 0 rgba(255,255,255,.8);
  height:62px;display:flex;align-items:center;
  padding:0 18px;gap:0;
  position:relative;overflow:hidden;
}
.tbar::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(45,122,90,.06) 0%,rgba(255,255,255,.0) 60%);
  pointer-events:none;
}
.tbar-icon{
  position:absolute;
  right:-18px;top:50%;transform:translateY(-50%);
  width:90px;height:90px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--g1);
  overflow:hidden;
  pointer-events:none;
}
.tbar-icon svg{
  width:90px;height:90px;
  color:var(--g1);
  opacity:.18;
  transform:rotate(-20deg);
  filter:drop-shadow(0 2px 8px rgba(45,122,90,.3));
}
.tbar-title{font-size:16px;font-weight:500;color:var(--txt);flex:1;letter-spacing:-.2px;margin-left:0;}
.tbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.back-btn{
  display:flex;align-items:center;gap:5px;font-size:13px;color:var(--mut);
  background:none;border:none;font-family:var(--en);cursor:pointer;padding:0;
  transition:color .15s;
}
.back-btn:hover{color:var(--g1);}
.back-btn svg{width:18px;height:18px;color:var(--g1);}
.chip{
  font-size:11px;color:var(--g1);font-family:var(--en);
  border:1px solid rgba(45,122,90,.4);background:rgba(45,122,90,.08);
  padding:4px 12px;border-radius:20px;white-space:nowrap;
}

/* ── STATS ROW ── */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
.sc{
  background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);
  padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden;
  transition:box-shadow .25s,border-color .25s;
}
.sc:hover{box-shadow:var(--shh);border-color:rgba(45,122,90,.4);}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--g1),var(--g2));
  transform:scaleX(0);transform-origin:left;transition:transform .5s;}
.sc.lit::after{transform:scaleX(1);}
.sn{font-size:26px;font-weight:500;color:var(--g1);line-height:1;}
.sl{font-size:11px;color:var(--mut);margin-top:5px;letter-spacing:.4px;}

<script>
var courses  = JSON.parse(localStorage.getItem('stf_c')  || '[]');
var chapters = JSON.parse(localStorage.getItem('stf_ch') || '[]');
var heatmap  = JSON.parse(localStorage.getItem('stf_h')  || '{}');
var pomLog   = JSON.parse(localStorage.getItem('stf_pl') || '[]');
var pomSC    = parseInt(localStorage.getItem('stf_ps')   || '0');
var actCid   = null;

function save() {
  localStorage.setItem('stf_c',  JSON.stringify(courses));
  localStorage.setItem('stf_ch', JSON.stringify(chapters));
  localStorage.setItem('stf_h',  JSON.stringify(heatmap));
  localStorage.setItem('stf_pl', JSON.stringify(pomLog));
  localStorage.setItem('stf_ps', String(pomSC));
}

function nav(p) {
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.nb').forEach(function(x){x.classList.remove('active');});
  document.getElementById('p-'+p).classList.add('active');
  var nb=document.getElementById('n-'+p); if(nb) nb.classList.add('active');
  if(p==='courses') rCourses();
  if(p==='pom'){syncPom();rPomLog();rPomSt();}
  if(p==='cal') rCal();
  if(p==='stats') rStats();
  window.scrollTo({top:0,behavior:'smooth'});
}

function openDetail(cid) {
  actCid=cid;
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  document.getElementById('p-detail').classList.add('active');
  var cr=courses.find(function(c){return c.id===cid;});
  if(cr){var tb=document.getElementById('dTbarTitle');if(tb)tb.textContent=cr.name;}
  rDetailBanner(); rChaps();
  window.scrollTo({top:0,behavior:'smooth'});
}
function goBack(){actCid=null;nav('courses');}

var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
(function(){
  var n=new Date();
  document.getElementById('hDay').textContent=DAYS[n.getDay()];
  document.getElementById('calChip').textContent=DAYS[n.getDay()];
})();

function cChaps(cid){return chapters.filter(function(c){return c.courseId===cid;});}
function cMins(cid){return cChaps(cid).reduce(function(a,c){return a+(c.minutes||0);},0);}
function cDone(cid){return cChaps(cid).filter(function(c){return c.done;}).length;}
function cProg(cid){var ch=cChaps(cid);return ch.length?Math.round(cDone(cid)/ch.length*100):0;}

function addCourse(){
  var name=document.getElementById('cni').value.trim(); if(!name)return;
  var inst=document.getElementById('cii').value.trim();
  courses.push({id:Date.now(),name:name,inst:inst});
  save();rCourses();uStats();
  document.getElementById('cni').value='';document.getElementById('cii').value='';
  toast('Course added');
}
document.getElementById('cni').addEventListener('keydown',function(e){if(e.key==='Enter')addCourse();});

function deleteCourse(id){
  chapters=chapters.filter(function(c){return c.courseId!==id;});
  courses=courses.filter(function(c){return c.id!==id;});
  save();rCourses();uStats();toast('Deleted');
}

function rCourses(){
  uStats();
  var g=document.getElementById('cGrid');
  if(!courses.length){
    g.innerHTML="<div class='empty'><div class='eico'><svg><use href='#i-book'/></svg></div>No courses yet.</div>";
    return;
  }
  var html='';
  courses.forEach(function(cr){
    var chs=cChaps(cr.id),pct=cProg(cr.id),dn=cDone(cr.id);
    html+='<div class="cc" onclick="openDetail('+cr.id+')">'
      +'<div class="cc-wm"><svg><use href="#i-book"/></svg></div>'
      +'<div class="cc-top">'
        +'<button class="cc-del" onclick="event.stopPropagation();deleteCourse('+cr.id+')">'
          +'<svg><use href="#i-trash"/></svg>'
        +'</button>'
      +'</div>'
      +'<div class="cc-name">'+esc(cr.name)+'</div>'
      +'<div class="cc-inst">'+(cr.inst?esc(cr.inst):'No instructor')+'</div>'
      +'<div class="cc-chips">'
        +'<span class="cc-chip"><svg><use href="#i-chap"/></svg>'+chs.length+' chapter'+(chs.length!==1?'s':'')+'</span>'
        +'<span class="cc-chip"><svg><use href="#i-chk"/></svg>'+dn+' done</span>'
      +'</div>'
      +'<div class="cc-pl"><span>Progress</span><span>'+pct+'%</span></div>'
      +'<div class="cc-pt"><div class="cc-pf" style="width:'+pct+'%"></div></div>'
    +'</div>';
  });
  g.innerHTML=html;
}

function uStats(){
  document.getElementById('nC').textContent=courses.length;
  document.getElementById('nCh').textContent=chapters.length;
  document.getElementById('nD').textContent=chapters.filter(function(c){return c.done;}).length;
}

function rDetailBanner(){
  var cr=courses.find(function(c){return c.id===actCid;}); if(!cr)return;
  var chs=cChaps(cr.id),pct=cProg(cr.id),dn=cDone(cr.id);
  var tb=document.getElementById('dTbarTitle'); if(tb)tb.textContent=cr.name;
  document.getElementById('dBanner').innerHTML=
    "<div class='db-title'>"+esc(cr.name)+"</div>"
    +"<div class='db-inst'>"+(cr.inst?esc(cr.inst):'No instructor')+"</div>"
    +"<div class='db-stats'>"
      +"<div class='db-st'><svg><use href='#i-chap'/></svg><span><strong>"+chs.length+"</strong> chapters</span></div>"
      +"<div class='db-st'><svg><use href='#i-chk'/></svg><span><strong>"+dn+"</strong> done</span></div>"
    +"</div>"
    +"<div class='db-pl'><span>Progress</span><span>"+pct+"%</span></div>"
    +"<div class='db-pt'><div class='db-pf' style='width:"+pct+"%'></div></div>";
}

function rChaps(){
  var el=document.getElementById('chList');
  var chs=cChaps(actCid);
  if(!chs.length){el.innerHTML="<div class='empty'><div class='eico'><svg><use href='#i-chap'/></svg></div>No chapters yet.</div>";return;}
  el.innerHTML=chs.map(function(ch,i){
    var pct=Math.min(100,Math.round(((ch.minutes||0)/120)*100));
    var h=Math.floor((ch.minutes||0)/60),m=(ch.minutes||0)%60;
    return "<div class='chc' style='"+(ch.done?'opacity:.42;':'')+"'>"
      +"<div>"
        +"<div style='display:flex;align-items:center;gap:8px;margin-bottom:4px'>"
          +"<span class='ch-num'>"+(i+1)+"</span>"
          +"<span class='ch-name'>"+esc(ch.name)+"</span>"
        +"</div>"
        +"<span class='ch-tag'>"+( {class:'Class',exam:'Exam',project:'Project',revision:'Revision'}[ch.tag]||ch.tag )+"</span>"
        +"<div class='ch-pr'><div class='ch-prt'><div class='ch-prf' style='width:"+pct+"%'></div></div>"
          +"<span class='ch-prp'>"+pct+"%</span></div>"
      +"</div>"
      +"<div class='ch-right'>"
        +"<button class='tb' onclick='updMins("+ch.id+",-30)'><svg><use href='#i-min'/></svg></button>"
        +"<span class='td'>"+(h>0?h+'h':m+'m')+"</span>"
        +"<button class='tb' onclick='updMins("+ch.id+",30)'><svg><use href='#i-pls'/></svg></button>"
        +"<button class='ib ck' onclick='togDone("+ch.id+")'><svg><use href='#i-chk'/></svg></button>"
        +"<button class='ib' onclick='delChap("+ch.id+")'><svg><use href='#i-trash'/></svg></button>"
      +"</div>"
    +"</div>";
  }).join('');
}

function addChapter(){
  var name=document.getElementById('chni').value.trim(); if(!name||!actCid)return;
  var tag=document.getElementById('chtag').value;
  chapters.push({id:Date.now(),name:name,tag:tag,courseId:actCid,minutes:0,done:false});
  save();rDetailBanner();rChaps();syncPom();
  document.getElementById('chni').value='';toast('Chapter added');
}
document.getElementById('chni').addEventListener('keydown',function(e){if(e.key==='Enter')addChapter();});
function delChap(id){chapters=chapters.filter(function(c){return c.id!==id;});save();rDetailBanner();rChaps();syncPom();}
function togDone(id){var ch=chapters.find(function(c){return c.id===id;});if(ch){ch.done=!ch.done;save();rDetailBanner();rChaps();}}
function updMins(id,d){
  var ch=chapters.find(function(c){return c.id===id;}); if(!ch)return;
  ch.minutes=Math.max(0,(ch.minutes||0)+d);
  if(d>0){var t=today();heatmap[t]=(heatmap[t]||0)+1;}
  save();rDetailBanner();rChaps();
}

/* ── POMODORO ── */
var CIRC=2*Math.PI*83;
var pomSecs=25*60,pomTotal=25*60,pomRun=false,pomInt=null,pomMode='work';
function setPomMode(m,mins){
  if(pomRun)return;
  pomMode=m;pomSecs=pomTotal=mins*60;
  ['work','short','long'].forEach(function(id){document.getElementById('pt-'+id).classList.remove('active');});
  document.getElementById('pt-'+m).classList.add('active');
  updPD();updRing();
}
function syncPom(){
  var sel=document.getElementById('pSel'),prev=sel.value;
  sel.innerHTML="<option value=''>— Pick a chapter —</option>"+
    chapters.map(function(ch){
      var cr=courses.find(function(c){return c.id===ch.courseId;});
      return "<option value='"+ch.id+"'"+(ch.id==prev?' selected':'')+">"+(cr?esc(cr.name)+' — ':'')+esc(ch.name)+"</option>";
    }).join('');
}
function pad(n){return String(n).padStart(2,'0');}
function updPD(){document.getElementById('pDisp').textContent=pad(Math.floor(pomSecs/60))+':'+pad(pomSecs%60);}
function updRing(){document.getElementById('pRing').style.strokeDashoffset=String(CIRC*(1-pomSecs/pomTotal));}
function togPom(){
  if(pomRun){
    clearInterval(pomInt);pomRun=false;
    document.getElementById('pTog').textContent='Start';
    document.getElementById('pTog').classList.remove('stop');
  }else{
    pomRun=true;
    document.getElementById('pTog').textContent='Stop';
    document.getElementById('pTog').classList.add('stop');
    pomInt=setInterval(function(){
      if(pomSecs<=0){
        clearInterval(pomInt);pomRun=false;
        document.getElementById('pTog').textContent='Start';
        document.getElementById('pTog').classList.remove('stop');
        if(pomMode==='work'){
          pomSC++;
          var sid=parseInt(document.getElementById('pSel').value);
          var sn=sid?((chapters.find(function(c){return c.id===sid;})||{}).name||''):'';
          if(sid)updMins(sid,pomTotal/60);
          var t=today();heatmap[t]=(heatmap[t]||0)+1;
          pomLog.unshift({ts:Date.now(),subject:sn,mins:pomTotal/60});
          if(pomLog.length>30)pomLog.splice(30);
          save();rPomLog();rPomSt();
          toast('Session done! +'+pomTotal/60+' min');
          document.getElementById('pSessLbl').textContent='Session '+(pomSC+1);
        }
        pomSecs=pomTotal;updPD();updRing();return;
      }
      pomSecs--;updPD();updRing();
    },1000);
  }
}
function resetPom(){
  clearInterval(pomInt);pomRun=false;pomSecs=pomTotal;
  document.getElementById('pTog').textContent='Start';
  document.getElementById('pTog').classList.remove('stop');
  updPD();updRing();
}
function rPomLog(){
  var el=document.getElementById('pLog');
  var tl=pomLog.filter(function(l){return new Date(l.ts).toISOString().slice(0,10)===today();});
  if(!tl.length){el.innerHTML="<div class='empty' style='padding:16px 0'><div class='eico'><svg><use href='#i-time'/></svg></div>No sessions today yet</div>";return;}
  el.innerHTML=tl.map(function(l){
    var d=new Date(l.ts);
    return "<div class='li'><div class='ln'>"+(l.subject?esc(l.subject):'No chapter')+"</div><div class='lm'>"+l.mins+" min &bull; "+pad(d.getHours())+':'+pad(d.getMinutes())+"</div></div>";
  }).join('');
}
function rPomSt(){
  var tl=pomLog.filter(function(l){return new Date(l.ts).toISOString().slice(0,10)===today();});
  document.getElementById('pS').textContent=tl.length;
  document.getElementById('pM').textContent=tl.reduce(function(a,l){return a+l.mins;},0);
  var streak=0,d=new Date();
  while(true){var k=d.toISOString().slice(0,10);if(heatmap[k]){streak++;d.setDate(d.getDate()-1);}else break;}
  document.getElementById('pStr').textContent=streak;
  document.getElementById('pSessLbl').textContent='Session '+(pomSC+1);
}

/* ── CALENDAR ── */
var calY=new Date().getFullYear(),calMo=new Date().getMonth();
function calMove(d){calMo+=d;if(calMo>11){calMo=0;calY++;}if(calMo<0){calMo=11;calY--;}rCal();}
function showCalDet(ds){
  var wrap=document.getElementById('calDetWrap');
  var det=document.getElementById('calDet');
  var parts=ds.split('-');
  var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var label=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+parts[2]+', '+parts[0];
  var tl=pomLog.filter(function(l){return new Date(l.ts).toISOString().slice(0,10)===ds;});
  var html="<div class='cdet-date'><svg><use href='#i-cal'/></svg>"+label+"</div>";
  if(!tl.length){
    html+="<div class='cdet-empty'>No sessions recorded.</div>";
  }else{
    tl.forEach(function(l){
      var t=new Date(l.ts);
      html+="<div class='cdet-item'>"
        +"<div><div class='cdet-name'>"+(l.subject?esc(l.subject):'Study session')+"</div>"
        +"<div class='cdet-sub'>"+pad(t.getHours())+':'+pad(t.getMinutes())+"</div></div>"
        +"<div class='cdet-time'>"+l.mins+" min</div>"
      +"</div>";
    });
  }
  det.innerHTML=html;
  wrap.style.display='block';
  wrap.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function rCal(){
  document.getElementById('calLbl').textContent=MONTHS[calMo]+' '+calY;
  document.getElementById('calHead').innerHTML=DAYS.map(function(d){return "<div class='cdn'>"+d+"</div>";}).join('');
  var tstr=today(),first=new Date(calY,calMo,1).getDay(),days=new Date(calY,calMo+1,0).getDate();
  var html='';
  for(var i=0;i<first;i++) html+="<div class='cell empty-c'></div>";
  for(var d2=1;d2<=days;d2++){
    var ds=calY+'-'+String(calMo+1).padStart(2,'0')+'-'+String(d2).padStart(2,'0');
    var iT=ds===tstr,hS=!!heatmap[ds];
    html+="<div class='cell"+(iT?' today':'')+(hS?' studied':'')+"' data-ds='"+ds+"'>"+d2+"</div>";
  }
  document.getElementById('calGrid').innerHTML=html;
  document.getElementById('calDetWrap').style.display='none';
  document.querySelectorAll('[data-ds]').forEach(function(el){
    el.addEventListener('click',function(){showCalDet(el.dataset.ds);});
  });
}

/* ── PIE ── */
var PC=['#2d7a5a','#1a4d35','#5b9b78','#8ebfa6'];
function drawPie(data){
  var svg=document.getElementById('pieSvg');
  var tot=data.reduce(function(a,d){return a+d.v;},0);
  if(!tot){svg.innerHTML='<circle cx="65" cy="65" r="50" fill="#f0f4f8"/><circle cx="65" cy="65" r="32" fill="white"/>';return;}
  var angle=-Math.PI/2,paths='';
  data.forEach(function(d,i){
    var slice=(d.v/tot)*2*Math.PI,r=50,inner=32,cx=65,cy=65;
    var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    var x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice);
    var xi1=cx+inner*Math.cos(angle),yi1=cy+inner*Math.sin(angle);
    var xi2=cx+inner*Math.cos(angle+slice),yi2=cy+inner*Math.sin(angle+slice);
    var lg=slice>Math.PI?1:0;
    var p='M'+xi1+' '+yi1+' L'+x1+' '+y1+' A'+r+' '+r+' 0 '+lg+' 1 '+x2+' '+y2+' L'+xi2+' '+yi2+' A'+inner+' '+inner+' 0 '+lg+' 0 '+xi1+' '+yi1+' Z';
    paths+="<path d='"+p+"' fill='"+PC[i%PC.length]+"' opacity='"+(d.dim?.4:1)+"'/>";
    angle+=slice;
  });
  paths+="<circle cx='65' cy='65' r='32' fill='white'/>";
  svg.innerHTML=paths;
}

/* ── STATS ── */
function rStats(){
  var tot=chapters.reduce(function(a,c){return a+(c.minutes||0);},0);
  var done=chapters.filter(function(c){return c.done;}).length;
  var act=chapters.filter(function(c){return !c.done;}).length;
  document.getElementById('bHrs').textContent=(tot/60).toFixed(1);
  document.getElementById('bDone').textContent=done;
  document.getElementById('bAct').textContent=act;
  var streak=0,d=new Date();
  while(true){var k=d.toISOString().slice(0,10);if(heatmap[k]){streak++;d.setDate(d.getDate()-1);}else break;}
  document.getElementById('bStr').textContent=streak;
  var tp=chapters.length,dp=tp?Math.round(done/tp*100):0;
  document.getElementById('piePct').textContent=dp+'%';
  drawPie([{label:'Completed',v:done,dim:false},{label:'Remaining',v:act,dim:true}].filter(function(x){return x.v>0;}));
  document.getElementById('pieLeg').innerHTML=[{label:'Completed',v:done,dim:false},{label:'Remaining',v:act,dim:true}].filter(function(x){return x.v>0;}).map(function(d,i){
    return "<div class='pli'><div class='pld' style='background:"+PC[i]+(d.dim?';opacity:.4':'')+"'></div><span class='pln'>"+d.label+"</span><span class='plv'>"+d.v+"</span></div>";
  }).join('');
  var maxM=Math.max(1,...chapters.map(function(c){return c.minutes||0;}));
  var bc=document.getElementById('barChart');
  bc.innerHTML=chapters.length?chapters.slice().sort(function(a,b){return(b.minutes||0)-(a.minutes||0);}).slice(0,8).map(function(ch){
    var p=Math.round(((ch.minutes||0)/maxM)*100);
    return "<div class='brow'><span class='blbl'>"+esc(ch.name)+"</span><div class='btrk'><div class='bfil' style='width:"+p+"%'></div></div><span class='bval'>"+((ch.minutes||0)/60).toFixed(1)+"h</span></div>";
  }).join(''):"<div class='empty' style='padding:16px 0'>No data yet</div>";
  var maxCM=Math.max(1,...courses.map(function(c){return cMins(c.id);}));
  var cc=document.getElementById('cChart');
  cc.innerHTML=courses.length?courses.slice().sort(function(a,b){return cMins(b.id)-cMins(a.id);}).map(function(c){
    var p=Math.round(cMins(c.id)/maxCM*100);
    return "<div class='brow'><span class='blbl'>"+esc(c.name)+"</span><div class='btrk'><div class='bfil' style='width:"+p+"%'></div></div><span class='bval'>"+(cMins(c.id)/60).toFixed(1)+"h</span></div>";
  }).join(''):"<div class='empty' style='padding:16px 0'>No courses yet</div>";
}

/* ── UTILS ── */
function today(){return new Date().toISOString().slice(0,10);}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

rCourses();syncPom();updPD();updRing();rPomSt();rCal();
</script>
